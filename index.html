<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malcolm's Movie Machine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@300;400;600;700&display=swap');

  :root {
    --bg-deep: #0a0a12;
    --bg-card: #13131f;
    --bg-card-hover: #1a1a2e;
    --accent-gold: #f0c040;
    --accent-gold-dim: #c49a20;
    --accent-red: #e74c3c;
    --accent-green: #2ecc71;
    --accent-blue: #5dade2;
    --text-primary: #eee;
    --text-secondary: #999;
    --text-muted: #666;
    --border: #222;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Starfield background */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 15% 75%, rgba(240,192,64,0.5), transparent),
      radial-gradient(1.5px 1.5px at 85% 25%, rgba(93,173,226,0.4), transparent),
      radial-gradient(1px 1px at 45% 45%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 65% 15%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 25% 90%, rgba(255,255,255,0.2), transparent);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4rem;
    letter-spacing: 6px;
    color: var(--accent-gold);
    text-shadow: 0 0 40px rgba(240,192,64,0.3);
    line-height: 1;
  }

  .header p {
    color: var(--text-secondary);
    font-size: 1rem;
    margin-top: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 300;
  }

  /* Search area */
  .search-area {
    position: relative;
    margin-bottom: 32px;
  }

  .search-row {
    display: flex;
    gap: 0;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid var(--border);
    transition: border-color 0.3s;
  }

  .search-row:focus-within {
    border-color: var(--accent-gold);
    box-shadow: 0 0 20px rgba(240,192,64,0.15);
  }

  .search-row input {
    flex: 1;
    background: var(--bg-card);
    border: none;
    padding: 16px 20px;
    font-size: 1.1rem;
    color: var(--text-primary);
    font-family: 'Source Sans 3', sans-serif;
    outline: none;
  }

  .search-row input::placeholder {
    color: var(--text-muted);
  }

  .search-row button {
    background: var(--accent-gold);
    border: none;
    padding: 16px 28px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 2px;
    color: var(--bg-deep);
    cursor: pointer;
    transition: background 0.2s;
  }

  .search-row button:hover {
    background: var(--accent-gold-dim);
  }

  .search-row button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Status / loading */
  .status {
    text-align: center;
    padding: 20px;
    color: var(--text-secondary);
    font-size: 0.95rem;
  }

  .status .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--text-muted);
    border-top-color: var(--accent-gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Disambiguation list */
  .disambiguation {
    background: var(--bg-card);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 24px;
    animation: fadeIn 0.3s ease;
  }

  .disambiguation .title {
    padding: 16px 20px 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    color: var(--accent-gold);
  }

  .disambiguation .subtitle {
    padding: 0 20px 12px;
    font-size: 0.85rem;
    color: var(--text-secondary);
  }

  .movie-option {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }

  .movie-option:hover {
    background: var(--bg-card-hover);
  }

  .movie-option .year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--accent-gold);
    min-width: 60px;
  }

  .movie-option .info {
    flex: 1;
  }

  .movie-option .info .name {
    font-weight: 600;
    font-size: 1.05rem;
  }

  .movie-option .info .detail {
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .movie-option .arrow {
    color: var(--text-muted);
    font-size: 1.2rem;
    margin-left: 12px;
  }

  /* Results card */
  .results-card {
    background: var(--bg-card);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    animation: slideUp 0.4s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .results-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--border);
  }

  .results-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 2px;
    color: var(--text-primary);
    line-height: 1.1;
  }

  .results-header .year-tag {
    display: inline-block;
    margin-top: 6px;
    background: var(--accent-gold);
    color: var(--bg-deep);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 1px;
    padding: 2px 10px;
    border-radius: 4px;
  }

  .results-header .director {
    margin-top: 8px;
    color: var(--text-secondary);
    font-size: 0.95rem;
  }

  /* Score grid */
  .scores-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }

  .score-cell {
    background: var(--bg-card);
    padding: 22px 24px;
    text-align: center;
  }

  .score-cell .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .score-cell .value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    line-height: 1;
  }

  .score-cell .sub {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  .score-good { color: var(--accent-green); }
  .score-mid { color: var(--accent-gold); }
  .score-bad { color: var(--accent-red); }
  .score-neutral { color: var(--accent-blue); }

  /* Info sections */
  .info-section {
    padding: 22px 28px;
    border-top: 1px solid var(--border);
  }

  .info-section .section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: var(--accent-gold);
    margin-bottom: 10px;
  }

  .info-section p {
    color: var(--text-secondary);
    font-size: 0.95rem;
    line-height: 1.6;
  }

  .oscar-won {
    color: var(--accent-gold) !important;
    font-weight: 600;
  }

  .box-office-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--accent-green);
  }

  .box-office-original {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Fun facts */
  .fun-facts-list {
    list-style: none;
    padding: 0;
  }

  .fun-facts-list li {
    color: var(--text-secondary);
    font-size: 0.95rem;
    line-height: 1.6;
    padding: 8px 0 8px 28px;
    position: relative;
  }

  .fun-facts-list li + li {
    border-top: 1px solid rgba(255,255,255,0.04);
  }

  .fun-facts-list li::before {
    content: '🎬';
    position: absolute;
    left: 0;
    top: 8px;
  }

  .ebert-quote {
    border-left: 3px solid var(--accent-gold);
    padding-left: 16px;
    font-style: italic;
  }

  /* New search button */
  .new-search-btn {
    display: block;
    margin: 28px auto 0;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 10px 24px;
    border-radius: 8px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .new-search-btn:hover {
    border-color: var(--accent-gold);
    color: var(--accent-gold);
  }

  /* PIN screen */
  .pin-screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg-deep);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .pin-screen h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.6rem;
    letter-spacing: 4px;
    color: var(--accent-gold);
    text-shadow: 0 0 40px rgba(240,192,64,0.3);
    margin-bottom: 8px;
  }

  .pin-screen .pin-subtitle {
    color: var(--text-muted);
    font-size: 0.9rem;
    letter-spacing: 1px;
    margin-bottom: 32px;
  }

  .pin-dots {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
  }

  .pin-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--text-muted);
    transition: all 0.2s;
  }

  .pin-dot.filled {
    background: var(--accent-gold);
    border-color: var(--accent-gold);
    box-shadow: 0 0 10px rgba(240,192,64,0.4);
  }

  .pin-dot.wrong {
    border-color: var(--accent-red);
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .pin-pad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 240px;
  }

  .pin-key {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pin-key:hover {
    border-color: var(--accent-gold);
    background: var(--bg-card-hover);
  }

  .pin-key:active {
    transform: scale(0.95);
  }

  .pin-key.pin-back {
    font-size: 1.2rem;
    color: var(--text-muted);
  }

  .pin-error {
    color: var(--accent-red);
    font-size: 0.85rem;
    margin-top: 16px;
    height: 20px;
  }

  /* Error */
  .error-msg {
    text-align: center;
    color: var(--accent-red);
    padding: 20px;
    font-size: 0.95rem;
  }

  /* Responsive */
  @media (max-width: 500px) {
    .header h1 { font-size: 2.8rem; }
    .scores-grid { grid-template-columns: 1fr; }
    .results-header { padding: 20px; }
    .info-section { padding: 18px 20px; }
  }
</style>
</head>
<body>
<div class="pin-screen" id="pinScreen">
  <h1>MALCOLM'S MOVIE MACHINE</h1>
  <div class="pin-subtitle">ENTER PIN TO CONTINUE</div>
  <div class="pin-dots">
    <div class="pin-dot" id="dot0"></div>
    <div class="pin-dot" id="dot1"></div>
    <div class="pin-dot" id="dot2"></div>
    <div class="pin-dot" id="dot3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-key" onclick="pinPress('1')">1</button>
    <button class="pin-key" onclick="pinPress('2')">2</button>
    <button class="pin-key" onclick="pinPress('3')">3</button>
    <button class="pin-key" onclick="pinPress('4')">4</button>
    <button class="pin-key" onclick="pinPress('5')">5</button>
    <button class="pin-key" onclick="pinPress('6')">6</button>
    <button class="pin-key" onclick="pinPress('7')">7</button>
    <button class="pin-key" onclick="pinPress('8')">8</button>
    <button class="pin-key" onclick="pinPress('9')">9</button>
    <button class="pin-key" style="visibility:hidden"></button>
    <button class="pin-key" onclick="pinPress('0')">0</button>
    <button class="pin-key pin-back" onclick="pinBack()">&#9003;</button>
  </div>
  <div class="pin-error" id="pinError"></div>
</div>

<div class="app" id="app" style="display:none;">
  <div class="header">
    <h1>MALCOLM'S MOVIE MACHINE</h1>
    <p>Scores &bull; Oscars &bull; Box Office</p>
  </div>

  <div class="search-area">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Type a movie name..." autofocus />
      <button id="searchBtn" onclick="doSearch()">SEARCH</button>
    </div>
  </div>

  <div id="content"></div>
</div>

<script>
// ===== PIN GATE =====
// Change this to whatever 4-digit PIN you want
const CORRECT_PIN = "0117";

let currentPin = "";

function updateDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('dot' + i);
    dot.className = i < currentPin.length ? 'pin-dot filled' : 'pin-dot';
  }
}

function pinPress(digit) {
  if (currentPin.length >= 4) return;
  currentPin += digit;
  document.getElementById('pinError').textContent = '';
  updateDots();

  if (currentPin.length === 4) {
    setTimeout(() => {
      if (currentPin === CORRECT_PIN) {
        document.getElementById('pinScreen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        searchInput.focus();
      } else {
        document.getElementById('pinError').textContent = 'Wrong PIN — try again';
        const dots = document.querySelectorAll('.pin-dot');
        dots.forEach(d => d.classList.add('wrong'));
        setTimeout(() => {
          currentPin = '';
          updateDots();
          dots.forEach(d => d.classList.remove('wrong'));
        }, 500);
      }
    }, 200);
  }
}

function pinBack() {
  if (currentPin.length > 0) {
    currentPin = currentPin.slice(0, -1);
    document.getElementById('pinError').textContent = '';
    updateDots();
  }
}

// Keyboard support for PIN screen
document.addEventListener('keydown', (e) => {
  if (document.getElementById('pinScreen').style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9') pinPress(e.key);
  if (e.key === 'Backspace') pinBack();
});

// ===== MAIN APP =====
const API_URL = "https://api.anthropic.com/v1/messages";
const MODEL = "claude-sonnet-4-20250514";
const content = document.getElementById('content');
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');

searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !searchBtn.disabled) doSearch();
});

function setLoading(msg) {
  content.innerHTML = `<div class="status"><span class="spinner"></span>${msg}</div>`;
}

function setError(msg) {
  content.innerHTML = `<div class="error-msg">${msg}</div>`;
}

async function callClaude(systemPrompt, userPrompt) {
  const res = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": "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",
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 4096,
      system: systemPrompt,
      messages: [{ role: "user", content: userPrompt }],
      tools: [{ type: "web_search_20250305", name: "web_search" }]
    })
  });
  if (!res.ok) {
    const errBody = await res.text();
    console.error("API error:", res.status, errBody);
    throw new Error(`API error ${res.status}: ${errBody}`);
  }
  return await res.json();
}

function extractText(data) {
  return data.content
    .filter(b => b.type === "text")
    .map(b => b.text)
    .join("\n");
}

function extractJSON(text) {
  // Try to find JSON in the response
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) return null;
  try {
    return JSON.parse(jsonMatch[0]);
  } catch {
    return null;
  }
}

async function doSearch() {
  const query = searchInput.value.trim();
  if (!query) return;

  searchBtn.disabled = true;
  setLoading("Searching for movies...");

  try {
    const sysPrompt = `You are a movie database assistant. The user will give you a movie title. Search the web to find movies matching that title. Return ONLY a JSON object (no markdown, no backticks) in this exact format:
{
  "movies": [
    {
      "title": "Full Movie Title",
      "year": 2020,
      "director": "Director Name",
      "brief": "One line description"
    }
  ]
}
Include up to 5 matches. If it's a well-known single movie with no ambiguity, return just that one. Always search the web to verify. Only include actual released films, not TV shows or shorts.`;

    const data = await callClaude(sysPrompt, `Find movies titled: "${query}"`);
    const text = extractText(data);
    const parsed = extractJSON(text);

    if (!parsed || !parsed.movies || parsed.movies.length === 0) {
      setError("Couldn't find any movies with that name. Try another title!");
      searchBtn.disabled = false;
      return;
    }

    if (parsed.movies.length === 1) {
      // Single match - go straight to details
      await fetchDetails(parsed.movies[0]);
    } else {
      // Multiple matches - show disambiguation
      showDisambiguation(parsed.movies);
      searchBtn.disabled = false;
    }
  } catch (err) {
    console.error(err);
    setError("Something went wrong: " + err.message);
    searchBtn.disabled = false;
  }
}

function showDisambiguation(movies) {
  let html = `<div class="disambiguation">
    <div class="title">WHICH ONE?</div>
    <div class="subtitle">We found multiple movies with that name</div>`;

  movies.forEach((m, i) => {
    html += `<div class="movie-option" onclick='pickMovie(${JSON.stringify(m).replace(/'/g, "&#39;")})'>
      <div class="year">${m.year || '???'}</div>
      <div class="info">
        <div class="name">${m.title}</div>
        <div class="detail">${m.director ? 'Dir. ' + m.director : ''}${m.brief ? (m.director ? ' — ' : '') + m.brief : ''}</div>
      </div>
      <div class="arrow">&#8250;</div>
    </div>`;
  });

  html += '</div>';
  content.innerHTML = html;
}

async function pickMovie(movie) {
  searchBtn.disabled = true;
  await fetchDetails(movie);
}

async function fetchDetails(movie) {
  setLoading(`Looking up ${movie.title} (${movie.year || ''})...`);

  try {
    const sysPrompt = `You are a movie data assistant. Search the web for detailed information about the specified movie. Return ONLY a JSON object (no markdown, no backticks, no explanation) in this exact format:
{
  "title": "Full Title",
  "year": 2020,
  "director": "Director Name",
  "metacritic": 75,
  "rt_critics": 90,
  "rt_audience": 85,
  "oscars_summary": "A text summary of Oscar nominations and wins. Be specific about categories. If none, say 'Not nominated for any Academy Awards.'",
  "box_office_original": "$200,000,000",
  "box_office_year": 2020,
  "box_office_2026": "$230,000,000",
  "inflation_note": "Brief note on how you calculated the 2026 figure",
  "ebert_review": "A 2-3 sentence summary of Roger Ebert's review of this film — what he thought of it and what star rating he gave it (out of 4). If Ebert did not review this film, set this to null.",
  "fun_facts": [
    "A fun/interesting fact about the movie aimed at an 11-year-old boy. These could be cool production facts (e.g. practical effects, stunts, how sets were built), connections to other movies the kid might know (reference movies from 2014 onward), things about the director or actors relative to other popular recent movies, surprising behind-the-scenes stories, or record-breaking achievements. Keep each fact to 1-2 sentences. Make them genuinely interesting and not generic."
  ]
}

For fun_facts, include exactly 3 items. Focus on what would genuinely excite or surprise an 11-year-old — think cool stunts, practical effects, connections to Marvel/Star Wars/popular franchises, interesting actor facts relative to movies since 2014, huge production budgets, wild behind-the-scenes stories, or record-breaking stats.

For inflation adjustment, use US CPI data. Approximate annual inflation rates: use ~2-3% per year from the movie's release year to 2026. Calculate the cumulative adjustment.

For metacritic, use the Metascore (out of 100). For Rotten Tomatoes, give both the critics Tomatometer and audience score as percentages.

For ebert_review, search for "Roger Ebert [movie title] review" to find his actual review on rogerebert.com. Summarize what he thought in your own words. If the movie came out after Ebert's death in 2013, check if the site rogerebert.com still published a review by another critic — if so, mention the reviewer's name. If no review exists on rogerebert.com, set to null.

If a value is genuinely not available, use null for numbers and "Not available" for strings. Always search the web to get accurate data. For box office, use worldwide gross.`;

    const data = await callClaude(sysPrompt, `Get full details for: "${movie.title}" (${movie.year || 'film'}), directed by ${movie.director || 'unknown'}`);
    const text = extractText(data);
    const info = extractJSON(text);

    if (!info) {
      setError("Couldn't parse movie details. Try again!");
      searchBtn.disabled = false;
      return;
    }

    showResults(info);
  } catch (err) {
    console.error(err);
    setError("Something went wrong fetching details: " + err.message);
  }
  searchBtn.disabled = false;
}

function scoreClass(val, max) {
  if (val === null || val === undefined) return 'score-neutral';
  const pct = max === 100 ? val : (val / max) * 100;
  if (pct >= 70) return 'score-good';
  if (pct >= 50) return 'score-mid';
  return 'score-bad';
}

function showResults(info) {
  const mc = info.metacritic;
  const rtc = info.rt_critics;
  const rta = info.rt_audience;

  let html = `<div class="results-card">
    <div class="results-header">
      <h2>${info.title || 'Unknown'}</h2>
      ${info.year ? `<span class="year-tag">${info.year}</span>` : ''}
      ${info.director ? `<div class="director">Directed by ${info.director}</div>` : ''}
    </div>

    <div class="scores-grid">
      <div class="score-cell">
        <div class="label">Metacritic</div>
        <div class="value ${scoreClass(mc, 100)}">${mc !== null && mc !== undefined ? mc : '—'}</div>
        <div class="sub">out of 100</div>
      </div>
      <div class="score-cell">
        <div class="label">RT Critics</div>
        <div class="value ${scoreClass(rtc, 100)}">${rtc !== null && rtc !== undefined ? rtc + '%' : '—'}</div>
        <div class="sub">Tomatometer</div>
      </div>
      <div class="score-cell">
        <div class="label">RT Audience</div>
        <div class="value ${scoreClass(rta, 100)}">${rta !== null && rta !== undefined ? rta + '%' : '—'}</div>
        <div class="sub">Audience Score</div>
      </div>
      <div class="score-cell">
        <div class="label">Box Office (2026 $)</div>
        <div class="value score-neutral" style="font-size:1.6rem">${info.box_office_2026 || '—'}</div>
        <div class="sub">${info.box_office_original && info.box_office_original !== info.box_office_2026 ? 'Original: ' + info.box_office_original : 'Worldwide gross'}</div>
      </div>
    </div>

    <div class="info-section">
      <div class="section-label">ACADEMY AWARDS</div>
      <p class="${info.oscars_summary && info.oscars_summary.toLowerCase().includes('won') ? 'oscar-won' : ''}">${info.oscars_summary || 'No Oscar information available.'}</p>
    </div>

    ${info.ebert_review ? `<div class="info-section">
      <div class="section-label">ROGER EBERT'S TAKE</div>
      <p class="ebert-quote">${info.ebert_review}</p>
    </div>` : ''}

    ${info.fun_facts && info.fun_facts.length > 0 ? `<div class="info-section">
      <div class="section-label">COOL FACTS</div>
      <ul class="fun-facts-list">
        ${info.fun_facts.map(f => `<li>${f}</li>`).join('')}
      </ul>
    </div>` : ''}

    ${info.inflation_note ? `<div class="info-section">
      <div class="section-label">INFLATION NOTE</div>
      <p>${info.inflation_note}</p>
    </div>` : ''}
  </div>

  <button class="new-search-btn" onclick="resetSearch()">SEARCH ANOTHER MOVIE</button>`;

  content.innerHTML = html;
}

function resetSearch() {
  content.innerHTML = '';
  searchInput.value = '';
  searchInput.focus();
}
</script>
</body>
</html>
